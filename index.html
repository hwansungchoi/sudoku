<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>数独 Sudoku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECE0;
    --cell:#FBF8F1;
    --cell-given:#F0EADB;
    --ink:#22262F;
    --ink-soft:#7C786C;
    --vermilion:#C5403A;
    --vermilion-wash:rgba(197,64,58,0.12);
    --indigo:#3A5A8C;
    --line:#CFC8B6;
    --peer:rgba(34,38,47,0.045);
    --same:rgba(58,90,140,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Zen Kaku Gothic New",sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100%;
    padding:calc(28px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
    -webkit-user-select:none;user-select:none;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
    touch-action:manipulation;
  }
  button{touch-action:manipulation;}
  .app{width:100%;max-width:480px;}

  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .kanji{font-family:"Shippori Mincho",serif;font-weight:700;font-size:38px;letter-spacing:2px;line-height:1;}
  .latin{font-family:"Shippori Mincho",serif;font-weight:500;font-size:16px;letter-spacing:6px;text-transform:uppercase;color:var(--ink-soft);}
  .stats{text-align:right;font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .stats .timer{font-variant-numeric:tabular-nums;font-size:22px;color:var(--ink);font-weight:500;letter-spacing:1px;}
  .stats .meta{display:flex;gap:12px;justify-content:flex-end;}
  .stats .meta b{color:var(--ink);font-weight:500;}

  .difficulty{display:flex;gap:6px;margin-bottom:16px;}
  .difficulty button{
    flex:1;border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:13px;padding:8px 0;border-radius:7px;cursor:pointer;
    transition:all .15s ease;letter-spacing:.5px;
  }
  .difficulty button:hover{border-color:var(--ink-soft);}
  .difficulty button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* board */
  .board-wrap{position:relative;}
  .board{
    display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
    background:var(--ink);
    border:3px solid var(--ink);border-radius:6px;overflow:hidden;
    gap:1px;
    aspect-ratio:1/1;
    box-shadow:0 18px 40px -22px rgba(34,38,47,0.55);
  }
  .cell{
    background:var(--cell);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(18px,6.5vw,30px);font-weight:500;
    cursor:pointer;position:relative;user-select:none;
    transition:background .12s ease;
    color:var(--indigo);
  }
  .cell.given{color:var(--ink);font-weight:700;background:var(--cell-given);}
  .cell.box-r{box-shadow:2px 0 0 0 var(--ink);z-index:1;}
  .cell.box-b{box-shadow:0 2px 0 0 var(--ink);z-index:1;}
  .cell.box-r.box-b{box-shadow:2px 0 0 0 var(--ink),0 2px 0 0 var(--ink);}
  .cell.peer{background:var(--peer);}
  .cell.peer.given{background:#E9E2D0;}
  .cell.same{background:var(--same);}
  .cell.selected{background:var(--vermilion-wash);box-shadow:inset 0 0 0 2px var(--vermilion);z-index:2;}
  .cell.conflict{color:var(--vermilion);}
  .cell .notes{
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    width:100%;height:100%;padding:3px;
  }
  .cell .notes span{
    font-size:clamp(7px,2.4vw,11px);color:var(--ink-soft);font-weight:400;
    display:flex;align-items:center;justify-content:center;line-height:1;
  }

  /* number pad */
  .pad{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:16px;}
  .pad button{
    aspect-ratio:1/1.15;border:1px solid var(--line);background:var(--cell);
    border-radius:8px;font-family:"Shippori Mincho",serif;font-size:clamp(16px,5vw,24px);
    color:var(--ink);cursor:pointer;position:relative;transition:all .12s ease;
  }
  .pad button:hover{background:#fff;transform:translateY(-1px);}
  .pad button:active{transform:translateY(0);}
  .pad button.done{opacity:.32;pointer-events:none;}
  .pad button .left{
    position:absolute;bottom:2px;right:4px;font-family:"Zen Kaku Gothic New",sans-serif;
    font-size:9px;color:var(--ink-soft);font-weight:400;
  }

  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
  .tools button{
    border:1px solid var(--line);background:transparent;border-radius:8px;
    padding:11px 0;font-family:inherit;font-size:13px;color:var(--ink);
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:all .15s ease;
  }
  .tools button:hover{background:var(--cell);border-color:var(--ink-soft);}
  .tools button .ic{font-size:18px;line-height:1;}
  .tools button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .tools button.on .sub{color:var(--paper);}
  .tools button .sub{font-size:10px;color:var(--ink-soft);letter-spacing:.5px;}

  .newgame{
    margin-top:14px;width:100%;border:none;background:var(--vermilion);color:#FBF8F1;
    font-family:"Shippori Mincho",serif;font-size:16px;letter-spacing:3px;padding:14px 0;
    border-radius:9px;cursor:pointer;transition:filter .15s ease;
  }
  .newgame:hover{filter:brightness(1.06);}

  /* win stamp */
  .win{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(241,236,224,0.78);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);border-radius:6px;z-index:10;
  }
  .win.show{display:flex;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .stamp{
    width:140px;height:140px;border:5px solid var(--vermilion);border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--vermilion);transform:rotate(-12deg);
    animation:stamp .5s cubic-bezier(.2,1.4,.4,1) .1s both;
  }
  @keyframes stamp{from{transform:rotate(-12deg) scale(2.4);opacity:0;}to{transform:rotate(-12deg) scale(1);opacity:1;}}
  .stamp .c{font-family:"Shippori Mincho",serif;font-weight:700;font-size:52px;line-height:1;}
  .stamp .t{font-size:12px;letter-spacing:3px;margin-top:6px;}
  .win .wtime{position:absolute;bottom:18px;font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;}

  @media (max-width:380px){
    .latin{display:none;}
    .tools button .sub{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="kanji">数独</span>
      <span class="latin">Sudoku</span>
    </div>
    <div class="stats">
      <div class="timer" id="timer">00:00</div>
      <div class="meta"><span>실수 <b id="mistakes">0</b></span><span>힌트 <b id="hints">0</b></span></div>
    </div>
  </header>

  <div class="difficulty" id="difficulty">
    <button data-d="easy">쉬움</button>
    <button data-d="medium" class="active">보통</button>
    <button data-d="hard">어려움</button>
    <button data-d="expert">전문가</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="win" id="win">
      <div class="stamp"><span class="c">完</span><span class="t">CLEAR</span></div>
      <div class="wtime" id="wtime"></div>
    </div>
  </div>

  <div class="pad" id="pad"></div>

  <div class="tools">
    <button id="btnNotes"><span class="ic">✎</span><span class="sub">메모</span></button>
    <button id="btnErase"><span class="ic">⌫</span><span class="sub">지우기</span></button>
    <button id="btnHint"><span class="ic">💡</span><span class="sub">힌트</span></button>
    <button id="btnUndo"><span class="ic">↶</span><span class="sub">되돌리기</span></button>
  </div>

  <button class="newgame" id="newgame">새 게임</button>
</div>

<script>
"use strict";
const boxIndex = (r,c)=>((r/3)|0)*3 + ((c/3)|0);
const shuffle = a=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};

// ---- puzzle generation ----
function generateSolution(){
  const grid=new Array(81).fill(0);
  const rows=new Array(9).fill(0),cols=new Array(9).fill(0),boxes=new Array(9).fill(0);
  function rec(pos){
    if(pos===81)return true;
    const r=(pos/9)|0,c=pos%9,b=boxIndex(r,c);
    const cand=(~(rows[r]|cols[c]|boxes[b]))&0x1FF;
    const list=[];
    for(let v=1;v<=9;v++)if(cand&(1<<(v-1)))list.push(v);
    shuffle(list);
    for(const v of list){
      const bit=1<<(v-1);
      grid[pos]=v;rows[r]|=bit;cols[c]|=bit;boxes[b]|=bit;
      if(rec(pos+1))return true;
      grid[pos]=0;rows[r]&=~bit;cols[c]&=~bit;boxes[b]&=~bit;
    }
    return false;
  }
  rec(0);
  return grid;
}

function countSolutions(grid,limit){
  const rows=new Array(9).fill(0),cols=new Array(9).fill(0),boxes=new Array(9).fill(0);
  for(let i=0;i<81;i++){
    const v=grid[i];if(!v)continue;
    const r=(i/9)|0,c=i%9,bit=1<<(v-1);
    rows[r]|=bit;cols[c]|=bit;boxes[boxIndex(r,c)]|=bit;
  }
  let count=0;
  function rec(){
    if(count>=limit)return;
    let best=-1,bestCand=0,bestCnt=10;
    for(let i=0;i<81;i++){
      if(grid[i])continue;
      const r=(i/9)|0,c=i%9,b=boxIndex(r,c);
      const cand=(~(rows[r]|cols[c]|boxes[b]))&0x1FF;
      let cnt=0,m=cand;while(m){cnt++;m&=m-1;}
      if(cnt===0)return;
      if(cnt<bestCnt){bestCnt=cnt;best=i;bestCand=cand;if(cnt===1)break;}
    }
    if(best===-1){count++;return;}
    const r=(best/9)|0,c=best%9,b=boxIndex(r,c);
    let m=bestCand;
    while(m&&count<limit){
      const bit=m&-m;m&=m-1;
      const v=Math.round(Math.log2(bit))+1;
      grid[best]=v;rows[r]|=bit;cols[c]|=bit;boxes[b]|=bit;
      rec();
      grid[best]=0;rows[r]&=~bit;cols[c]&=~bit;boxes[b]&=~bit;
    }
  }
  rec();
  return count;
}

function makePuzzle(difficulty){
  const solution=generateSolution();
  const puzzle=solution.slice();
  const targetClues={easy:44,medium:34,hard:30,expert:26}[difficulty];
  const order=shuffle([...Array(81).keys()]);
  let clues=81;
  for(const i of order){
    if(clues<=targetClues)break;
    const backup=puzzle[i];
    if(!backup)continue;
    puzzle[i]=0;
    if(countSolutions(puzzle,2)!==1)puzzle[i]=backup;
    else clues--;
  }
  return {puzzle,solution};
}

// ---- game state ----
let state;
const boardEl=document.getElementById('board');
const padEl=document.getElementById('pad');
const cells=[];

function initBoard(){
  boardEl.innerHTML='';
  cells.length=0;
  for(let i=0;i<81;i++){
    const r=(i/9)|0,c=i%9;
    const d=document.createElement('div');
    d.className='cell';
    if(c%3===2&&c!==8)d.classList.add('box-r');
    if(r%3===2&&r!==8)d.classList.add('box-b');
    d.addEventListener('click',()=>select(i));
    boardEl.appendChild(d);
    cells.push(d);
  }
}

function buildPad(){
  padEl.innerHTML='';
  for(let v=1;v<=9;v++){
    const b=document.createElement('button');
    b.dataset.v=v;
    b.innerHTML=v+'<span class="left"></span>';
    b.addEventListener('click',()=>enterNumber(v));
    padEl.appendChild(b);
  }
}

function newGame(difficulty){
  const {puzzle,solution}=makePuzzle(difficulty);
  state={
    difficulty,
    given:puzzle.map(v=>v!==0),
    values:puzzle.slice(),
    solution,
    notes:Array.from({length:81},()=>0), // bitmask
    selected:-1,
    notesMode:false,
    mistakes:0,
    hints:0,
    history:[],
    seconds:0,
    done:false,
  };
  document.getElementById('win').classList.remove('show');
  document.getElementById('mistakes').textContent='0';
  document.getElementById('hints').textContent='0';
  restartTimer();
  render();
}

// ---- interaction ----
function select(i){
  if(state.done)return;
  state.selected=i;
  render();
}

function pushHistory(){
  state.history.push({values:state.values.slice(),notes:state.notes.slice(),mistakes:state.mistakes});
  if(state.history.length>200)state.history.shift();
}

function enterNumber(v){
  const i=state.selected;
  if(i<0||state.given[i]||state.done)return;
  pushHistory();
  if(state.notesMode){
    if(state.values[i]){state.history.pop();return;}
    state.notes[i]^=(1<<(v-1));
  }else{
    if(state.values[i]===v){state.values[i]=0;}
    else{
      state.values[i]=v;
      state.notes[i]=0;
      if(v!==state.solution[i]){state.mistakes++;document.getElementById('mistakes').textContent=state.mistakes;}
      clearPeerNotes(i,v);
    }
  }
  render();
  checkWin();
}

function clearPeerNotes(i,v){
  const r=(i/9)|0,c=i%9,b=boxIndex(r,c),bit=1<<(v-1);
  for(let j=0;j<81;j++){
    const jr=(j/9)|0,jc=j%9;
    if(jr===r||jc===c||boxIndex(jr,jc)===b)state.notes[j]&=~bit;
  }
}

function erase(){
  const i=state.selected;
  if(i<0||state.given[i]||state.done)return;
  pushHistory();
  state.values[i]=0;state.notes[i]=0;
  render();
}

function hint(){
  const i=state.selected;
  if(i<0||state.given[i]||state.done||state.values[i]===state.solution[i])return;
  pushHistory();
  state.values[i]=state.solution[i];
  state.notes[i]=0;
  clearPeerNotes(i,state.solution[i]);
  state.hints++;document.getElementById('hints').textContent=state.hints;
  render();
  checkWin();
}

function undo(){
  if(!state.history.length||state.done)return;
  const prev=state.history.pop();
  state.values=prev.values;state.notes=prev.notes;state.mistakes=prev.mistakes;
  document.getElementById('mistakes').textContent=state.mistakes;
  render();
}

// ---- render ----
function render(){
  const sel=state.selected;
  const selR=sel>=0?(sel/9)|0:-1, selC=sel>=0?sel%9:-1, selB=sel>=0?boxIndex(selR,selC):-1;
  const selVal=sel>=0?state.values[sel]:0;

  for(let i=0;i<81;i++){
    const el=cells[i];
    const r=(i/9)|0,c=i%9,b=boxIndex(r,c),v=state.values[i];
    el.className='cell';
    if(c%3===2&&c!==8)el.classList.add('box-r');
    if(r%3===2&&r!==8)el.classList.add('box-b');
    if(state.given[i])el.classList.add('given');

    if(sel>=0){
      if(i===sel)el.classList.add('selected');
      else if(r===selR||c===selC||b===selB)el.classList.add('peer');
      if(selVal&&v===selVal)el.classList.add('same');
    }
    // conflict check
    if(v&&hasConflict(i,v))el.classList.add('conflict');

    if(v){
      el.textContent=v;
    }else if(state.notes[i]){
      let html='<div class="notes">';
      for(let n=1;n<=9;n++)html+='<span>'+((state.notes[i]&(1<<(n-1)))?n:'')+'</span>';
      html+='</div>';
      el.innerHTML=html;
    }else{
      el.textContent='';
    }
  }
  // pad remaining counts
  const counts=new Array(10).fill(0);
  for(let i=0;i<81;i++)if(state.values[i])counts[state.values[i]]++;
  padEl.querySelectorAll('button').forEach(b=>{
    const v=+b.dataset.v;const left=9-counts[v];
    b.querySelector('.left').textContent=left>0?left:'';
    b.classList.toggle('done',left<=0);
  });
}

function hasConflict(i,v){
  const r=(i/9)|0,c=i%9,b=boxIndex(r,c);
  for(let j=0;j<81;j++){
    if(j===i)continue;
    if(state.values[j]!==v)continue;
    const jr=(j/9)|0,jc=j%9;
    if(jr===r||jc===c||boxIndex(jr,jc)===b)return true;
  }
  return false;
}

function checkWin(){
  for(let i=0;i<81;i++)if(state.values[i]!==state.solution[i])return;
  state.done=true;
  stopTimer();
  document.getElementById('wtime').textContent='기록 '+fmt(state.seconds)+' · 실수 '+state.mistakes+' · 힌트 '+state.hints;
  document.getElementById('win').classList.add('show');
}

// ---- timer ----
let timerId=null;
function fmt(s){const m=(s/60)|0;const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function restartTimer(){
  stopTimer();state.seconds=0;document.getElementById('timer').textContent='00:00';
  timerId=setInterval(()=>{if(state.done)return;state.seconds++;document.getElementById('timer').textContent=fmt(state.seconds);},1000);
}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}

// ---- controls ----
document.getElementById('difficulty').addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  document.querySelectorAll('#difficulty button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
});
document.getElementById('newgame').addEventListener('click',()=>{
  const d=document.querySelector('#difficulty button.active').dataset.d;
  newGame(d);
});
const btnNotes=document.getElementById('btnNotes');
btnNotes.addEventListener('click',()=>{state.notesMode=!state.notesMode;btnNotes.classList.toggle('on',state.notesMode);});
document.getElementById('btnErase').addEventListener('click',erase);
document.getElementById('btnHint').addEventListener('click',hint);
document.getElementById('btnUndo').addEventListener('click',undo);

document.addEventListener('keydown',e=>{
  if(state.done)return;
  if(e.key>='1'&&e.key<='9'){enterNumber(+e.key);e.preventDefault();return;}
  if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){erase();e.preventDefault();return;}
  if(e.key==='n'||e.key==='N'){btnNotes.click();return;}
  let s=state.selected;if(s<0)s=40;
  let r=(s/9)|0,c=s%9;
  if(e.key==='ArrowUp')r=(r+8)%9;
  else if(e.key==='ArrowDown')r=(r+1)%9;
  else if(e.key==='ArrowLeft')c=(c+8)%9;
  else if(e.key==='ArrowRight')c=(c+1)%9;
  else return;
  e.preventDefault();select(r*9+c);
});

// ---- boot ----
initBoard();
buildPad();
newGame('medium');
</script>
</body>
</html>
