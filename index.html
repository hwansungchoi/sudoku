<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sudoku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECE0;
    --cell:#FBF8F1;
    --cell-given:#F0EADB;
    --ink:#22262F;
    --ink-soft:#7C786C;
    --vermilion:#C5403A;
    --vermilion-wash:rgba(197,64,58,0.12);
    --indigo:#3A5A8C;
    --line:#CFC8B6;
    --peer:rgba(34,38,47,0.045);
    --same:rgba(58,90,140,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Sans KR",sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100%;
    padding:calc(28px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
    -webkit-user-select:none;user-select:none;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
    touch-action:manipulation;
  }
  button{touch-action:manipulation;}
  .app{width:100%;max-width:480px;}

  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px;}
  .brand{display:flex;flex-direction:column;align-items:flex-start;gap:7px;}
  .titlerow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .eyebrow{font-family:"Noto Sans KR",sans-serif;font-size:10px;letter-spacing:3px;color:var(--ink-soft);font-weight:500;}
  .latin{font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:23px;letter-spacing:-.5px;color:var(--ink);line-height:1.05;}
  .size{
    font-family:"Noto Sans KR",sans-serif;font-size:13px;color:var(--ink);font-weight:500;
    background:var(--cell);border:1px solid var(--line);border-radius:8px;
    padding:6px 10px;cursor:pointer;line-height:1;
  }
  .size:hover{border-color:var(--ink-soft);}
  .stats{text-align:right;font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .stats .timer{font-variant-numeric:tabular-nums;font-size:22px;color:var(--ink);font-weight:500;letter-spacing:1px;}
  .stats .meta{display:flex;gap:12px;justify-content:flex-end;}
  .stats .meta b{color:var(--ink);font-weight:500;}

  .difficulty{display:flex;gap:6px;margin-bottom:16px;}
  .difficulty button{
    flex:1;border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:13px;padding:8px 0;border-radius:7px;cursor:pointer;
    transition:all .15s ease;letter-spacing:.5px;
  }
  .difficulty button:hover{border-color:var(--ink-soft);}
  .difficulty button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* board */
  .board-wrap{position:relative;}
  #fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:20;}
  @keyframes cellpop{
    0%{transform:scale(1);}
    32%{transform:scale(1.16);background:#FBE6A0;box-shadow:0 0 0 2px #E0A33E;}
    100%{transform:scale(1);}
  }
  .cell.flash{animation:cellpop .5s ease;z-index:4;}
  .board{
    display:grid;
    background:var(--ink);
    border:3px solid var(--ink);border-radius:6px;overflow:hidden;
    gap:1px;
    aspect-ratio:1/1;
    box-shadow:0 18px 40px -22px rgba(34,38,47,0.55);
  }
  .cell{
    background:var(--cell);
    display:flex;align-items:center;justify-content:center;
    font-size:inherit;font-weight:500;
    cursor:pointer;position:relative;user-select:none;
    transition:background .12s ease;
    color:var(--indigo);
  }
  .cell.given{color:var(--ink);font-weight:700;background:var(--cell-given);}
  .cell.box-r{z-index:1;}
  .cell.box-b{z-index:1;}
  /* bold 3x3 grid lines as an overlay so they always sit on top of any cell shading */
  .boxlines{position:absolute;inset:3px;pointer-events:none;z-index:6;}
  .boxlines i{position:absolute;background:var(--ink);}
  .boxlines .v{top:0;bottom:0;width:3px;transform:translateX(-50%);}
  .boxlines .h{left:0;right:0;height:3px;transform:translateY(-50%);}
  .boxlines .v1{left:33.333%;}
  .boxlines .v2{left:66.667%;}
  .boxlines .h1{top:33.333%;}
  .boxlines .h2{top:66.667%;}
  .cell.peer{background:#DADFEC;}
  .cell.peer.given{background:#D3D6DD;}
  .cell.same{background:#9FB7DD;}
  .cell.same.given{background:#9FB7DD;}
  .cell.selected{background:#F6E3DC;box-shadow:inset 0 0 0 2px var(--vermilion);z-index:2;}
  .cell.conflict{color:var(--vermilion);}
  .cell .notes{
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    width:100%;height:100%;padding:3px;
  }
  .cell .notes span{
    font-size:0.3em;color:var(--ink-soft);font-weight:400;
    display:flex;align-items:center;justify-content:center;line-height:1;
  }

  /* number pad */
  .pad{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:16px;}
  .pad button{
    aspect-ratio:1/1.15;border:1px solid var(--line);background:var(--cell);
    border-radius:8px;font-family:"Noto Sans KR",sans-serif;font-weight:700;font-size:clamp(16px,5vw,24px);
    color:var(--ink);cursor:pointer;position:relative;transition:all .12s ease;
  }
  .pad button:hover{background:#fff;transform:translateY(-1px);}
  .pad button:active{transform:translateY(0);}
  .pad button.done{opacity:.32;pointer-events:none;}
  .pad button .left{
    position:absolute;bottom:2px;right:4px;font-family:"Zen Kaku Gothic New",sans-serif;
    font-size:9px;color:var(--ink-soft);font-weight:400;
  }

  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
  .tools button{
    border:1px solid var(--line);background:transparent;border-radius:8px;
    padding:11px 0;font-family:inherit;font-size:13px;color:var(--ink);
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:all .15s ease;
  }
  .tools button:hover{background:var(--cell);border-color:var(--ink-soft);}
  .tools button .ic{font-size:18px;line-height:1;}
  .tools button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .tools button.on .sub{color:var(--paper);}
  .tools button .sub{font-size:10px;color:var(--ink-soft);letter-spacing:.5px;}

  .newgame{
    margin-top:14px;width:100%;border:none;background:var(--vermilion);color:#FBF8F1;
    font-family:"Nanum Myeongjo",serif;font-weight:700;font-size:16px;letter-spacing:2px;padding:14px 0;
    border-radius:9px;cursor:pointer;transition:filter .15s ease;
  }
  .newgame:hover{filter:brightness(1.06);}

  /* clear reveal */
  .win{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(34,38,47,0.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
    border-radius:6px;z-index:10;padding:10px;
  }
  .win.show{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .reveal{
    width:94%;max-width:360px;max-height:99%;overflow:hidden;display:flex;flex-direction:column;
    background:var(--paper);border-radius:14px;box-shadow:0 24px 60px -20px rgba(0,0,0,.6);
  }
  .scene{position:relative;width:100%;aspect-ratio:400/205;overflow:hidden;background:#11151f;flex:none;}
  .sceneimg{position:absolute;inset:0;}
  .sceneimg svg{display:block;width:100%;height:100%;}
  .door{position:absolute;top:0;bottom:0;width:50.5%;z-index:2;
    background:
      repeating-linear-gradient(90deg, rgba(74,48,22,0) 0 17px, rgba(74,48,22,.55) 17px 19px),
      repeating-linear-gradient(0deg, rgba(74,48,22,0) 0 15px, rgba(74,48,22,.45) 15px 17px),
      linear-gradient(180deg,#B6824A,#9C6C39);
    transition:transform .95s cubic-bezier(.6,0,.25,1) .3s;}
  .door.left{left:0;border-right:2px solid #5E3F20;box-shadow:inset -7px 0 16px rgba(0,0,0,.28);}
  .door.right{right:0;border-left:2px solid #5E3F20;box-shadow:inset 7px 0 16px rgba(0,0,0,.28);}
  .reveal.open .door.left{transform:translateX(-101%);}
  .reveal.open .door.right{transform:translateX(101%);}
  .caption{padding:11px 16px 13px;text-align:center;}
  .clearmark{font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:23px;letter-spacing:6px;color:var(--vermilion);}
  .lmname{font-family:"Nanum Myeongjo",serif;font-weight:700;font-size:17px;color:var(--ink);margin-top:5px;}
  .lmregion{font-size:11px;color:var(--ink-soft);letter-spacing:.5px;margin-top:2px;}
  .wstat{font-size:11px;color:var(--ink-soft);margin-top:8px;font-variant-numeric:tabular-nums;}
  .progress{font-size:11px;color:var(--indigo);font-weight:600;margin-top:2px;}
  .again{margin-top:10px;width:100%;border:none;background:var(--vermilion);color:#FBF8F1;
    font-family:"Nanum Myeongjo",serif;font-weight:700;font-size:15px;letter-spacing:2px;
    padding:11px 0;border-radius:9px;cursor:pointer;transition:filter .15s ease;}
  .again:hover{filter:brightness(1.06);}

  @media (max-width:380px){
    .tools button .sub{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="eyebrow">KOREA LANDMARK EXPLORER</span>
      <span class="latin">한국 랜드마크 탐험</span>
    </div>
    <div class="stats">
      <div class="timer" id="timer">00:00</div>
      <div class="meta"><span>실수 <b id="mistakes">0</b></span><span>힌트 <b id="hints">0</b></span></div>
    </div>
  </header>

  <div class="difficulty" id="difficulty">
    <button data-d="easy">쉬움</button>
    <button data-d="medium" class="active">보통</button>
    <button data-d="hard">어려움</button>
    <button data-d="expert">전문가</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="boxlines" aria-hidden="true"><i class="v v1"></i><i class="v v2"></i><i class="h h1"></i><i class="h h2"></i></div>
    <canvas id="fx"></canvas>
    <div class="win" id="win">
      <div class="reveal" id="reveal">
        <div class="scene">
          <div class="sceneimg" id="scene"></div>
          <div class="door left"></div>
          <div class="door right"></div>
        </div>
        <div class="caption">
          <div class="clearmark">CLEAR</div>
          <div class="lmname" id="lmname"></div>
          <div class="lmregion" id="lmregion"></div>
          <div class="wstat" id="wtime"></div>
          <div class="progress" id="progress"></div>
          <button class="again" id="again">다음 명소 탐험</button>
        </div>
      </div>
    </div>
  </div>

  <div class="pad" id="pad"></div>

  <div class="tools">
    <button id="btnNotes"><span class="ic">✎</span><span class="sub">메모</span></button>
    <button id="btnErase"><span class="ic">⌫</span><span class="sub">지우기</span></button>
    <button id="btnHint"><span class="ic">💡</span><span class="sub">힌트</span></button>
    <button id="btnUndo"><span class="ic">↶</span><span class="sub">되돌리기</span></button>
  </div>

  <button class="newgame" id="newgame">새 게임</button>
</div>

<script>
"use strict";
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
// box dims [boxWidth(cols), boxHeight(rows)] or null for Latin-square sizes (5,7)
function boxDimsFor(N){const m={4:[2,2],6:[3,2],8:[4,2],9:[3,3],10:[5,2]};return m[N]||null;}
const notesCols=N=>Math.ceil(Math.sqrt(N));

// ---- puzzle generation (generic NxN) ----
function generateSolution(N,dims){
  const grid=new Array(N*N).fill(0),full=(1<<N)-1;
  const rows=new Array(N).fill(0),cols=new Array(N).fill(0);
  const boxes=dims?new Array(N).fill(0):null,bpr=dims?N/dims[0]:0;
  const bidx=dims?((r,c)=>(((r/dims[1])|0)*bpr)+((c/dims[0])|0)):null;
  function rec(pos){
    if(pos===N*N)return true;
    const r=(pos/N)|0,c=pos%N;let bi=0,used=rows[r]|cols[c];
    if(boxes){bi=bidx(r,c);used|=boxes[bi];}
    const cand=(~used)&full,list=[];
    for(let v=1;v<=N;v++)if(cand&(1<<(v-1)))list.push(v);
    shuffle(list);
    for(const v of list){const bit=1<<(v-1);
      grid[pos]=v;rows[r]|=bit;cols[c]|=bit;if(boxes)boxes[bi]|=bit;
      if(rec(pos+1))return true;
      grid[pos]=0;rows[r]&=~bit;cols[c]&=~bit;if(boxes)boxes[bi]&=~bit;}
    return false;
  }
  rec(0);return grid;
}
function countSolutions(grid,N,dims,limit){
  const full=(1<<N)-1;
  const rows=new Array(N).fill(0),cols=new Array(N).fill(0);
  const boxes=dims?new Array(N).fill(0):null,bpr=dims?N/dims[0]:0;
  const bidx=dims?((r,c)=>(((r/dims[1])|0)*bpr)+((c/dims[0])|0)):null;
  for(let i=0;i<N*N;i++){const v=grid[i];if(!v)continue;const r=(i/N)|0,c=i%N,bit=1<<(v-1);
    rows[r]|=bit;cols[c]|=bit;if(boxes)boxes[bidx(r,c)]|=bit;}
  let count=0;
  function rec(){
    if(count>=limit)return;
    let best=-1,bestCand=0,bestCnt=N+1;
    for(let i=0;i<N*N;i++){if(grid[i])continue;
      const r=(i/N)|0,c=i%N;let used=rows[r]|cols[c];if(boxes)used|=boxes[bidx(r,c)];
      const cand=(~used)&full;let cnt=0,m=cand;while(m){cnt++;m&=m-1;}
      if(cnt===0)return;if(cnt<bestCnt){bestCnt=cnt;best=i;bestCand=cand;if(cnt===1)break;}}
    if(best===-1){count++;return;}
    const r=(best/N)|0,c=best%N,bi=boxes?bidx(r,c):0;let m=bestCand;
    while(m&&count<limit){const bit=m&-m;m&=m-1;const v=Math.round(Math.log2(bit))+1;
      grid[best]=v;rows[r]|=bit;cols[c]|=bit;if(boxes)boxes[bi]|=bit;
      rec();
      grid[best]=0;rows[r]&=~bit;cols[c]&=~bit;if(boxes)boxes[bi]&=~bit;}
  }
  rec();return count;
}
function makePuzzle(N,dims,difficulty){
  const solution=generateSolution(N,dims),puzzle=solution.slice();
  const frac={easy:0.55,medium:0.45,hard:0.38,expert:0.32}[difficulty];
  const targetClues=Math.max(N,Math.round(N*N*frac));
  const order=shuffle([...Array(N*N).keys()]);let clues=N*N;
  for(const i of order){if(clues<=targetClues)break;const backup=puzzle[i];if(!backup)continue;
    puzzle[i]=0;if(countSolutions(puzzle.slice(),N,dims,2)!==1)puzzle[i]=backup;else clues--;}
  return {puzzle,solution};
}

// ---- DOM refs ----
let state;
const boardEl=document.getElementById('board');
const padEl=document.getElementById('pad');
const cells=[];

function buildBoard(){
  const N=state.N,dims=state.dims;
  boardEl.innerHTML='';cells.length=0;
  boardEl.style.gridTemplateColumns='repeat('+N+',1fr)';
  boardEl.style.gridTemplateRows='repeat('+N+',1fr)';
  for(let i=0;i<N*N;i++){
    const r=(i/N)|0,c=i%N,d=document.createElement('div');
    d.className='cell';
    if(dims){if((c+1)%dims[0]===0&&c!==N-1)d.classList.add('box-r');
             if((r+1)%dims[1]===0&&r!==N-1)d.classList.add('box-b');}
    d.addEventListener('click',()=>select(i));
    boardEl.appendChild(d);cells.push(d);
  }
  fitFont();
}
function buildPad(){
  const N=state.N;padEl.innerHTML='';
  padEl.style.gridTemplateColumns='repeat('+N+',1fr)';
  for(let v=1;v<=N;v++){const b=document.createElement('button');b.dataset.v=v;
    b.innerHTML=v+'<span class="left"></span>';b.addEventListener('click',()=>enterNumber(v));padEl.appendChild(b);}
}
function fitFont(){const w=boardEl.clientWidth;if(w&&state)boardEl.style.fontSize=(w/state.N*0.5)+'px';}
window.addEventListener('resize',fitFont);

function currentDiff(){return document.querySelector('#difficulty button.active').dataset.d;}

function newGame(difficulty){
  const N=9,dims=boxDimsFor(9);
  const {puzzle,solution}=makePuzzle(N,dims,difficulty);
  state={N,dims,difficulty,
    given:puzzle.map(v=>v!==0),values:puzzle.slice(),solution,
    notes:new Array(N*N).fill(0),selected:-1,notesMode:false,
    mistakes:0,hints:0,history:[],seconds:0,done:false,celebrated:new Set()};
  buildBoard();buildPad();
  document.getElementById('win').classList.remove('show');
  document.getElementById('reveal').classList.remove('open');
  document.getElementById('mistakes').textContent='0';
  document.getElementById('hints').textContent='0';
  if(btnNotes)btnNotes.classList.remove('on');
  restartTimer();render();
  state.celebrated=completedUnits();
}

// ---- interaction ----
function select(i){if(state.done)return;state.selected=i;render();}
function pushHistory(){
  state.history.push({values:state.values.slice(),notes:state.notes.slice(),mistakes:state.mistakes});
  if(state.history.length>300)state.history.shift();
}
function enterNumber(v){
  const i=state.selected;
  if(i<0||v>state.N||state.given[i]||state.done)return;
  pushHistory();let placed=null;
  if(state.notesMode){
    if(state.values[i]){state.history.pop();return;}
    state.notes[i]^=(1<<(v-1));
  }else{
    if(state.values[i]===v){state.values[i]=0;}
    else{
      state.values[i]=v;state.notes[i]=0;
      if(v===state.solution[i]){placed='correct';}
      else{placed='wrong';state.mistakes++;document.getElementById('mistakes').textContent=state.mistakes;}
      clearPeerNotes(i,v);
    }
  }
  render();
  if(placed==='correct')soundCorrect();
  else if(placed==='wrong')soundWrong();
  checkCompletions();
  checkWin();
}
function clearPeerNotes(i,v){
  const N=state.N,r=(i/N)|0,c=i%N,bit=1<<(v-1),dims=state.dims;
  let bi=-1,bpr=0;if(dims){bpr=N/dims[0];bi=(((r/dims[1])|0)*bpr)+((c/dims[0])|0);}
  for(let j=0;j<N*N;j++){const jr=(j/N)|0,jc=j%N;let peer=(jr===r||jc===c);
    if(dims&&!peer){const jb=(((jr/dims[1])|0)*bpr)+((jc/dims[0])|0);peer=(jb===bi);}
    if(peer)state.notes[j]&=~bit;}
}
function erase(){
  const i=state.selected;if(i<0||state.given[i]||state.done)return;
  pushHistory();state.values[i]=0;state.notes[i]=0;render();
}
function hint(){
  const i=state.selected;
  if(i<0||state.given[i]||state.done||state.values[i]===state.solution[i])return;
  pushHistory();
  state.values[i]=state.solution[i];state.notes[i]=0;
  clearPeerNotes(i,state.solution[i]);
  state.hints++;document.getElementById('hints').textContent=state.hints;
  render();soundCorrect();checkCompletions();checkWin();
}
function undo(){
  if(!state.history.length||state.done)return;
  const prev=state.history.pop();
  state.values=prev.values;state.notes=prev.notes;state.mistakes=prev.mistakes;
  document.getElementById('mistakes').textContent=state.mistakes;
  render();state.celebrated=completedUnits();
}

// ---- audio ----
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audioCtx=new AC();}
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function tone(freq,start,dur,type,gain){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime+start,osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type=type;osc.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(gain,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g);g.connect(audioCtx.destination);
  osc.start(t0);osc.stop(t0+dur+0.03);
}
function soundCorrect(){ensureAudio();tone(659.25,0,0.11,'sine',0.16);tone(987.77,0.07,0.13,'sine',0.14);}
function soundWrong(){ensureAudio();tone(196,0,0.16,'sawtooth',0.10);tone(146.83,0.05,0.22,'square',0.09);}
function soundLine(){ensureAudio();[523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>tone(f,i*0.06,0.28,'triangle',0.14));}

// ---- fireworks ----
const fx=document.getElementById('fx');
const fxctx=fx.getContext('2d');
let particles=[],fxRunning=false;
const FX_COLORS=['#C5403A','#3A5A8C','#E0A33E','#2E7D5B','#E8E2D0'];
function sizeFx(){
  const rect=boardEl.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  fx.width=Math.round(rect.width*dpr);fx.height=Math.round(rect.height*dpr);
  fxctx.setTransform(dpr,0,0,dpr,0,0);
}
function cellCenter(i){
  const cr=cells[i].getBoundingClientRect(),br=boardEl.getBoundingClientRect();
  return {x:cr.left-br.left+cr.width/2,y:cr.top-br.top+cr.height/2};
}
function burst(cx,cy,count,power){
  for(let k=0;k<count;k++){const ang=Math.random()*Math.PI*2,sp=2+Math.random()*power;
    particles.push({x:cx,y:cy,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-2.5,
      life:1,decay:0.012+Math.random()*0.012,color:FX_COLORS[(Math.random()*FX_COLORS.length)|0],
      size:3+Math.random()*3,rot:Math.random()*6.28,vr:-0.25+Math.random()*0.5});}
  if(!fxRunning){fxRunning=true;requestAnimationFrame(fxLoop);}
}
function fxLoop(){
  const rect=boardEl.getBoundingClientRect();
  fxctx.clearRect(0,0,rect.width,rect.height);
  for(const p of particles){p.vy+=0.13;p.x+=p.vx;p.y+=p.vy;p.vx*=0.99;p.life-=p.decay;p.rot+=p.vr;}
  particles=particles.filter(p=>p.life>0&&p.y<rect.height+30);
  for(const p of particles){fxctx.save();fxctx.globalAlpha=Math.max(0,p.life);
    fxctx.translate(p.x,p.y);fxctx.rotate(p.rot);fxctx.fillStyle=p.color;
    fxctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*1.5);fxctx.restore();}
  if(particles.length)requestAnimationFrame(fxLoop);
  else{fxctx.clearRect(0,0,rect.width,rect.height);fxRunning=false;}
}

// ---- line completion ----
function completedUnits(){
  const N=state.N,done=new Set();
  for(let r=0;r<N;r++){let ok=true;for(let c=0;c<N;c++){const i=r*N+c;if(!state.values[i]||state.values[i]!==state.solution[i]){ok=false;break;}}if(ok)done.add('r'+r);}
  for(let c=0;c<N;c++){let ok=true;for(let r=0;r<N;r++){const i=r*N+c;if(!state.values[i]||state.values[i]!==state.solution[i]){ok=false;break;}}if(ok)done.add('c'+c);}
  return done;
}
function unitCells(key){
  const N=state.N,idx=+key.slice(1),arr=[];
  if(key[0]==='r')for(let c=0;c<N;c++)arr.push(idx*N+c);
  else for(let r=0;r<N;r++)arr.push(r*N+idx);
  return arr;
}
function celebrate(key){
  const N=state.N;soundLine();sizeFx();
  const list=unitCells(key);
  list.forEach((idx,k)=>{const el=cells[idx];
    el.style.animationDelay=(k*0.045)+'s';el.classList.add('flash');
    setTimeout(()=>{el.classList.remove('flash');el.style.animationDelay='';},620+k*45);});
  [(N*0.2)|0,(N*0.5)|0,(N*0.8)|0].forEach((pos,j)=>{
    setTimeout(()=>{const c=cellCenter(list[pos]);burst(c.x,c.y,20,5.5);},j*90);});
}
function checkCompletions(){
  const now=completedUnits();
  now.forEach(key=>{if(!state.celebrated.has(key))celebrate(key);});
  state.celebrated=now;
}

// ---- render ----
function render(){
  const N=state.N,sel=state.selected,dims=state.dims;
  const selR=sel>=0?(sel/N)|0:-1,selC=sel>=0?sel%N:-1;
  const bpr=dims?N/dims[0]:0;
  const selB=(sel>=0&&dims)?(((selR/dims[1])|0)*bpr+((selC/dims[0])|0)):-1;
  const selVal=sel>=0?state.values[sel]:0;
  const ncols=notesCols(N);
  for(let i=0;i<N*N;i++){
    const el=cells[i],r=(i/N)|0,c=i%N,v=state.values[i];
    el.className='cell';
    if(dims){if((c+1)%dims[0]===0&&c!==N-1)el.classList.add('box-r');
             if((r+1)%dims[1]===0&&r!==N-1)el.classList.add('box-b');}
    if(state.given[i])el.classList.add('given');
    if(sel>=0){
      if(i===sel)el.classList.add('selected');
      else if(r===selR||c===selC||(dims&&(((r/dims[1])|0)*bpr+((c/dims[0])|0))===selB))el.classList.add('peer');
      if(selVal&&v===selVal)el.classList.add('same');
    }
    if(v&&hasConflict(i,v))el.classList.add('conflict');
    if(v){el.textContent=v;}
    else if(state.notes[i]){
      let html='<div class="notes" style="grid-template-columns:repeat('+ncols+',1fr)">';
      for(let n=1;n<=N;n++)html+='<span>'+((state.notes[i]&(1<<(n-1)))?n:'')+'</span>';
      html+='</div>';el.innerHTML=html;
    }else{el.textContent='';}
  }
  const counts=new Array(N+1).fill(0);
  for(let i=0;i<N*N;i++)if(state.values[i])counts[state.values[i]]++;
  padEl.querySelectorAll('button').forEach(b=>{const v=+b.dataset.v,left=N-counts[v];
    b.querySelector('.left').textContent=left>0?left:'';b.classList.toggle('done',left<=0);});
}
function hasConflict(i,v){
  const N=state.N,r=(i/N)|0,c=i%N,dims=state.dims;
  let bi=-1,bpr=0;if(dims){bpr=N/dims[0];bi=(((r/dims[1])|0)*bpr)+((c/dims[0])|0);}
  for(let j=0;j<N*N;j++){if(j===i)continue;if(state.values[j]!==v)continue;
    const jr=(j/N)|0,jc=j%N;let peer=(jr===r||jc===c);
    if(dims&&!peer){const jb=(((jr/dims[1])|0)*bpr)+((jc/dims[0])|0);peer=(jb===bi);}
    if(peer)return true;}
  return false;
}

let cleared=0;
function winFireworks(){
  sizeFx();
  const rect=boardEl.getBoundingClientRect();
  for(let t=0;t<7;t++){
    setTimeout(()=>{
      const x=rect.width*(0.14+Math.random()*0.72),y=rect.height*(0.1+Math.random()*0.5);
      burst(x,y,26,7);
    },t*170);
  }
}
function checkWin(){
  const N=state.N;
  for(let i=0;i<N*N;i++)if(state.values[i]!==state.solution[i])return;
  state.done=true;stopTimer();
  cleared++;
  const lm=LANDMARKS[(cleared-1)%LANDMARKS.length];
  document.getElementById('scene').innerHTML=lm.svg;
  document.getElementById('lmname').textContent=lm.ko;
  document.getElementById('lmregion').textContent=lm.region+' · '+lm.en;
  document.getElementById('wtime').textContent='기록 '+fmt(state.seconds)+'  ·  실수 '+state.mistakes+'  ·  힌트 '+state.hints;
  document.getElementById('progress').textContent='탐험한 명소 '+cleared+'곳';
  const win=document.getElementById('win'),reveal=document.getElementById('reveal');
  reveal.classList.remove('open');
  win.classList.add('show');
  winFireworks();
  soundLine();
  setTimeout(()=>reveal.classList.add('open'),260);
}

// ---- timer ----
let timerId=null;
function fmt(s){const m=(s/60)|0,ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function restartTimer(){
  stopTimer();state.seconds=0;document.getElementById('timer').textContent='00:00';
  timerId=setInterval(()=>{if(state.done)return;state.seconds++;document.getElementById('timer').textContent=fmt(state.seconds);},1000);
}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}

// ---- controls ----
document.getElementById('difficulty').addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  document.querySelectorAll('#difficulty button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
});
document.getElementById('newgame').addEventListener('click',()=>newGame(currentDiff()));
const btnNotes=document.getElementById('btnNotes');
btnNotes.addEventListener('click',()=>{state.notesMode=!state.notesMode;btnNotes.classList.toggle('on',state.notesMode);});
document.getElementById('btnErase').addEventListener('click',erase);
document.getElementById('btnHint').addEventListener('click',hint);
document.getElementById('btnUndo').addEventListener('click',undo);
document.getElementById('again').addEventListener('click',()=>newGame(currentDiff()));

document.addEventListener('keydown',e=>{
  if(!state||state.done)return;
  if(e.key>='1'&&e.key<='9'){const d=+e.key;if(d<=state.N)enterNumber(d);e.preventDefault();return;}
  if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){erase();e.preventDefault();return;}
  if(e.key==='n'||e.key==='N'){btnNotes.click();return;}
  const N=state.N;let s=state.selected;if(s<0)s=((N*N)/2)|0;
  let r=(s/N)|0,c=s%N;
  if(e.key==='ArrowUp')r=(r+N-1)%N;
  else if(e.key==='ArrowDown')r=(r+1)%N;
  else if(e.key==='ArrowLeft')c=(c+N-1)%N;
  else if(e.key==='ArrowRight')c=(c+1)%N;
  else return;
  e.preventDefault();select(r*N+c);
});
